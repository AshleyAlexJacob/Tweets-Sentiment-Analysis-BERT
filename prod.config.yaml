project:
  name: "Tweet Sentiment Analysis BERT (PROD)"
  version: "0.1.0"

data:
  raw_path: "dataset/raw"
  processed_path: "dataset/processed"
  train_fraction: 0.7
  val_fraction: 0.1
  test_fraction: 0.2
  random_state: 42
  max_length: 128
  batch_size: 32

model:
  # Medium-size baseline for Kaggle fine-tuning.
  name: "bert-base-uncased"
  num_labels: 3
  learning_rate: 2e-5
  epochs: 5
  checkpoint_path: "artifacts/checkpoints"

api:
  host: "0.0.0.0"
  port: 8000
  version: "v1"
